<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantWeave — 量化交易平台</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --color-primary: #F59E0B;
  --color-on-primary: #0F172A;
  --color-secondary: #FBBF24;
  --color-accent: #8B5CF6;
  --color-background: #0F172A;
  --color-foreground: #F8FAFC;
  --color-muted: #272F42;
  --color-border: #334155;
  --color-destructive: #EF4444;
  --color-ring: #F59E0B;
  --color-success: #10B981;
  --color-warning: #F59E0B;
  --color-up: #EF4444;
  --color-down: #22C55E;
  --font-heading: 'Fira Code', monospace;
  --font-body: 'Fira Sans', sans-serif;
  --sidebar-width: 260px;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -4px rgba(0, 0, 0, 0.3);
  --font-mono: 'Fira Code', monospace;

  /* === 兼容别名（screening.js 等模块使用） === */
  --border: var(--color-border);
  --surface: var(--color-muted);
  --surface-hover: #2F3B52;
  --primary: var(--color-primary);
  --text: var(--color-foreground);
  --text-secondary: #94A3B8;
  --text-muted: #64748B;
  --success: var(--color-success);
  --danger: var(--color-destructive);
  --warning: var(--color-warning);
  --success-bg: rgba(239, 68, 68, 0.15);
  --danger-bg: rgba(16, 185, 129, 0.15);
  --warning-bg: rgba(245, 158, 11, 0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--color-background);
  color: var(--color-foreground);
  line-height: 1.6;
  overflow: hidden;
  height: 100vh;
}

a { color: var(--color-primary); text-decoration: none; }
button { cursor: pointer; font-family: inherit; }

.layout {
  display: flex;
  height: 100vh;
  background: var(--color-background);
}

.sidebar {
  width: var(--sidebar-width);
  background: linear-gradient(180deg, #1E293B 0%, #0F172A 100%);
  border-right: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-brand {
  padding: 24px;
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-brand h1 {
  font-family: var(--font-heading);
  font-size: 20px;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: -0.5px;
}

.sidebar-brand span {
  font-size: 10px;
  color: var(--color-foreground);
  background: var(--color-accent);
  padding: 2px 8px;
  border-radius: 99px;
  font-weight: 600;
  opacity: 0.8;
}

.sidebar-nav { padding: 16px 12px; flex: 1; overflow-y: auto; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-radius: var(--radius);
  color: #94A3B8;
  font-weight: 500;
  font-size: 14px;
  transition: all 0.2s ease;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  margin-bottom: 4px;
}

.nav-item:hover {
  background: var(--color-muted);
  color: var(--color-foreground);
}

.nav-item.active {
  background: linear-gradient(135deg, var(--color-primary) 0%, #D97706 100%);
  color: var(--color-on-primary);
  font-weight: 600;
  box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
}

.nav-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--color-border);
  font-size: 12px;
  color: #64748B;
}

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
  background: var(--color-background);
  background-image: 
    radial-gradient(ellipse at top, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(245, 158, 11, 0.05) 0%, transparent 40%);
}

.page-header {
  margin-bottom: 32px;
}

.page-header h2 {
  font-family: var(--font-heading);
  font-size: 28px;
  font-weight: 700;
  color: var(--color-foreground);
  letter-spacing: -0.5px;
}

.page-header p {
  color: #64748B;
  font-size: 14px;
  margin-top: 4px;
}

.card {
  background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  padding: 24px;
  box-shadow: var(--shadow);
  transition: all 0.3s ease;
}

.card:hover {
  border-color: var(--color-primary);
  box-shadow: var(--shadow-lg), 0 0 0 1px rgba(245, 158, 11, 0.1);
}

.card-title {
  font-family: var(--font-heading);
  font-size: 12px;
  font-weight: 600;
  color: #94A3B8;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

.stat-value {
  font-family: var(--font-heading);
  font-size: 32px;
  font-weight: 700;
  color: var(--color-foreground);
  letter-spacing: -1px;
}

.stat-value.positive { color: var(--color-up); }
.stat-value.negative { color: var(--color-down); }

.stat-change {
  font-size: 13px;
  font-weight: 600;
  margin-top: 8px;
}

.stat-change.up { color: var(--color-up); }
.stat-change.down { color: var(--color-down); }

.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

.data-table th {
  text-align: left;
  padding: 14px 16px;
  font-family: var(--font-heading);
  font-weight: 600;
  color: #64748B;
  border-bottom: 1px solid var(--color-border);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.data-table td {
  padding: 14px 16px;
  border-bottom: 1px solid rgba(51, 65, 85, 0.5);
  color: var(--color-foreground);
}

.data-table tr:hover td {
  background: rgba(245, 158, 11, 0.05);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 14px;
  border: none;
  transition: all 0.2s ease;
}

.btn-primary {
  background: linear-gradient(135deg, var(--color-primary) 0%, #D97706 100%);
  color: var(--color-on-primary);
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(245, 158, 11, 0.4);
}

.btn-outline {
  background: transparent;
  color: var(--color-primary);
  border: 1px solid var(--color-primary);
}

.btn-outline:hover {
  background: rgba(245, 158, 11, 0.1);
}

.btn-sm { padding: 6px 12px; font-size: 12px; }

.btn-danger {
  background: var(--color-destructive);
  color: white;
}

.btn-danger:hover {
  background: #DC2626;
}

.btn-success {
  background: var(--color-success);
  color: white;
}

.btn-success:hover {
  background: #059669;
}

.btn-warning {
  background: var(--color-warning);
  color: var(--color-on-primary);
}

.btn-warning:hover {
  background: #D97706;
}

.btn-secondary {
  background: var(--color-muted);
  color: var(--color-foreground);
}

.btn-secondary:hover {
  background: var(--surface-hover);
}

.form-row {
  display: flex;
  gap: 16px;
}

.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.form-group { margin-bottom: 20px; }

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #94A3B8;
  margin-bottom: 8px;
}

.form-input, .form-select {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  background: var(--color-muted);
  color: var(--color-foreground);
  transition: all 0.2s ease;
}

.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
}

.form-input::placeholder {
  color: #64748B;
}

.tag {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-heading);
}

.tag-green { background: rgba(34, 197, 94, 0.15); color: #22C55E; }
.tag-red { background: rgba(239, 68, 68, 0.15); color: #EF4444; }
.tag-yellow { background: rgba(245, 158, 11, 0.15); color: #F59E0B; }
.tag-blue { background: rgba(59, 130, 246, 0.15); color: #3B82F6; }
.tag-purple { background: rgba(139, 92, 246, 0.15); color: #8B5CF6; }
.tag-gray { background: rgba(100, 116, 139, 0.15); color: #94A3B8; }
.tag-orange { background: rgba(249, 115, 22, 0.15); color: #F97316; }

.positive { color: var(--color-up); }
.negative { color: var(--color-down); }

@media (max-width: 1200px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    left: -100%;
    z-index: 100;
    box-shadow: var(--shadow-lg);
  }
  .sidebar.open { left: 0; }
  .main-content { padding: 20px; }
  .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
  .stat-value { font-size: 24px; }
  .page-header h2 { font-size: 20px; }
}

.mobile-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 101;
  background: var(--color-muted);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 10px 14px;
  font-size: 18px;
  color: var(--color-foreground);
}

@media (max-width: 768px) {
  .mobile-toggle { display: block; }
}

.loading {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
  color: #64748B;
}

.spinner {
  width: 24px; height: 24px;
  border: 2px solid var(--color-border);
  border-top-color: var(--color-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.toast {
  padding: 14px 20px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 500;
  box-shadow: var(--shadow-lg);
  animation: slideIn 0.3s ease;
  backdrop-filter: blur(10px);
}

.toast-success { background: rgba(34, 197, 94, 0.2); color: #22C55E; border: 1px solid rgba(34, 197, 94, 0.3); }
.toast-error { background: rgba(239, 68, 68, 0.2); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
.toast-info { background: rgba(59, 130, 246, 0.2); color: #3B82F6; border: 1px solid rgba(59, 130, 246, 0.3); }

@keyframes slideIn { 
  from { transform: translateX(100%); opacity: 0; } 
  to { transform: translateX(0); opacity: 1; } 
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(4px);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.modal-content {
  background: linear-gradient(135deg, #1E293B 0%, #0F172A 100%);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-border);
  padding: 28px;
  width: 90%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}

/* 宽modal（分析弹窗） */
.modal-content[style*="max-width:860px"],
.modal-content[style*="max-width: 860px"],
.modal-content[style*="max-width:800px"],
.modal-content[style*="max-width: 800px"] {
  max-width: 860px;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--color-border);
}

.modal-header h3 {
  font-family: var(--font-heading);
  font-size: 18px;
  font-weight: 700;
  color: var(--color-foreground);
}

.modal-close {
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: #64748B;
  transition: color 0.2s;
}

.modal-close:hover { color: var(--color-foreground); }

.modal-body { margin-bottom: 24px; }

.modal-footer {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  padding-top: 16px;
  border-top: 1px solid var(--color-border);
}

::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: var(--color-background);
}

::-webkit-scrollbar-thumb {
  background: var(--color-muted);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--color-border);
}

/* === 市场行情页专用 === */
.market-section {
  margin-bottom: 28px;
}
.section-title {
  font-family: var(--font-heading);
  font-size: 14px;
  font-weight: 600;
  color: #94A3B8;
  margin-bottom: 14px;
  letter-spacing: 0.5px;
}

/* ===== ML策略页面样式 ===== */
.ml-strategy-cards { margin-bottom: 24px; }
.ml-card-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
.ml-stat-card {
  background: var(--color-muted); border-radius: var(--radius-lg); padding: 16px;
  text-align: center; border: 1px solid var(--color-border);
}
.ml-stat-card:hover { border-color: var(--color-primary); }
.ml-stat-icon { font-size: 24px; margin-bottom: 4px; }
.ml-stat-value { font-size: 20px; font-weight: 700; color: var(--color-foreground); font-family: var(--font-heading); }
.ml-stat-label { font-size: 11px; color: #94A3B8; margin-top: 4px; }

.ml-toolbar { margin-bottom: 20px; }
.ml-toolbar-inner { display: flex; align-items: center; gap: 16px; }
.ml-btn {
  padding: 8px 20px; border-radius: var(--radius); border: none; cursor: pointer;
  font-size: 14px; font-weight: 600; transition: all 0.2s;
}
.ml-btn-primary { background: #059669; color: white; }
.ml-btn-primary:hover { background: #047857; }
.ml-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.ml-toolbar-hint { color: #94A3B8; font-size: 13px; }

.ml-loading, .ml-error, .ml-empty {
  text-align: center; padding: 40px; color: #94A3B8; font-size: 16px;
}
.ml-error { color: var(--color-destructive); }

.ml-picks-section { margin-bottom: 30px; }
.ml-section-title {
  font-size: 16px; font-weight: 600; color: var(--color-foreground);
  margin-bottom: 16px; padding-left: 10px; border-left: 3px solid #059669;
}
.ml-picks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.ml-pick-card {
  background: var(--color-muted); border-radius: var(--radius-lg); padding: 16px;
  border: 1px solid var(--color-border); transition: all 0.2s;
}
.ml-pick-card:hover { border-color: #059669; transform: translateY(-2px); box-shadow: var(--shadow); }
.ml-pick-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.ml-pick-rank {
  background: #059669; color: white; font-size: 12px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
}
.ml-pick-name { font-weight: 600; font-size: 15px; color: var(--color-foreground); flex: 1; }
.ml-pick-code { font-size: 11px; color: #94A3B8; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 3px; }
.ml-pick-price { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
.ml-pick-close { font-size: 22px; font-weight: 700; color: var(--color-foreground); font-family: var(--font-heading); }
.ml-pick-chg { font-size: 14px; font-weight: 600; }
.ml-pick-prob { margin-bottom: 10px; }
.ml-prob-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
.ml-prob-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
.ml-prob-text { font-size: 11px; color: #94A3B8; margin-top: 4px; display: block; }
.ml-pick-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.ml-pick-stat { text-align: center; }
.ml-pick-stat .ml-stat-key { display: block; font-size: 10px; color: #94A3B8; }
.ml-pick-stat .ml-stat-val { display: block; font-size: 13px; font-weight: 600; color: var(--color-foreground); }

.ml-detail-section { margin-top: 30px; }
.ml-detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
.ml-detail-card {
  background: var(--color-muted); border-radius: var(--radius-lg); padding: 16px;
  border: 1px solid var(--color-border);
}
.ml-detail-card h4 { font-size: 14px; font-weight: 600; color: var(--color-primary); margin-bottom: 10px; }
.ml-detail-table { width: 100%; font-size: 13px; }
.ml-detail-table td { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
.ml-detail-table td:first-child { color: #94A3B8; width: 40%; }
.ml-detail-table td:last-child { color: var(--color-foreground); font-weight: 500; }
.ml-logic-list { padding-left: 18px; font-size: 13px; color: var(--color-foreground); line-height: 1.8; }
.ml-logic-list li { margin-bottom: 2px; }
.ml-disclaimer {
  margin-top: 20px; padding: 12px; background: rgba(255,255,255,0.03);
  border-radius: var(--radius); font-size: 12px; color: #94A3B8; text-align: center;
}

.article-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 20px; }
.article-stat-item { text-align: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: var(--radius); }
.article-stat-label { font-size: 11px; color: #94A3B8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.article-stat-value { font-size: 22px; font-weight: 700; color: var(--color-foreground); font-family: var(--font-heading); }
.article-top-stocks { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.article-stock-item { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(255,255,255,0.04); border-radius: var(--radius); }
.article-rank-badge { font-size: 18px; }
.article-stock-name { font-weight: 600; font-size: 14px; color: var(--color-foreground); }
.article-tab-bar { display: flex; gap: 2px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border-radius: var(--radius); padding: 3px; width: fit-content; }
.article-tab { padding: 6px 18px; border: none; background: transparent; color: #94A3B8; font-size: 13px; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
.article-tab.active { background: var(--color-primary); color: white; }
.article-tab:hover:not(.active) { color: var(--color-foreground); }
.article-preview-wrapper { margin-bottom: 16px; }
.article-md-preview { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; min-height: 650px; max-height: 80vh; overflow-y: auto; }
.article-actions { display: flex; gap: 10px; flex-wrap: wrap; padding: 12px 0; }
.article-history-section { margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); }
.article-history-list { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
.article-history-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: rgba(255,255,255,0.03); border-radius: var(--radius); font-size: 13px; }
.article-history-date { color: #94A3B8; min-width: 90px; }
.article-history-filename { color: var(--color-foreground); flex: 1; font-family: var(--font-mono); font-size: 12px; }
.article-history-size { color: #94A3B8; min-width: 60px; text-align: right; }
</style>
</head>
<body>
<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content" id="mainContent"></main>
